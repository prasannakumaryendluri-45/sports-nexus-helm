apiVersion: apps/v1
kind: Deployment
metadata:
  name: sports-nexus
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: sports-nexus
  template:
    metadata:
      labels:
        app: sports-nexus
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
